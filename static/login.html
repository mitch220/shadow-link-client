<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Shadow Link Login</title>

    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

<div class="login-page">

    <div class="login-box">

        <h1>Shadow Link</h1>

        <p>Welcome! Enter a username to continue.</p>

        <input
            id="username"
            type="text"
            maxlength="20"
            placeholder="Username"
            autocomplete="off"
        >

        <button id="loginButton">
            Join Shadow Link
        </button>

    </div>

</div>

<script>

function login() {

    const username = document
        .getElementById("username")
        .value
        .trim();

    if (username.length < 2) {

        alert("Please enter a username.");

        return;

    }

    localStorage.setItem(
        "shadow_username",
        username
    );

    // Go to the chat page served by FastAPI
    window.location.href = "/chat";

}

document
.getElementById("loginButton")
.addEventListener("click", login);

document
.getElementById("username")
.addEventListener("keydown", function(event) {

    if (event.key === "Enter") {

        login();

    }

});

</script>

</body>
</html>
